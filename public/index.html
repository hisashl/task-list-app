<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task List App</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="bg-light">
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold" href="#">
        <i class="bi bi-check2-square me-2"></i>Task List App
      </a>
    </div>
  </nav>

  <!-- Main content -->
  <main class="container py-4">
    <div class="row justify-content-center">
      <div class="col-12 col-md-10 col-lg-8">

        <!-- Create task card -->
        <div class="card shadow-sm mb-4">
          <div class="card-body">
            <h5 class="card-title mb-3">
              <i class="bi bi-plus-circle me-2"></i>Add a New Task
            </h5>
            <form id="task-form">
              <div class="mb-3">
                <label for="task-title" class="form-label">Title</label>
                <input
                  type="text"
                  class="form-control"
                  id="task-title"
                  placeholder="What needs to be done?"
                  maxlength="255"
                  required
                />
              </div>
              <div class="mb-3">
                <label for="task-description" class="form-label">
                  Description <span class="text-muted">(optional)</span>
                </label>
                <textarea
                  class="form-control"
                  id="task-description"
                  rows="2"
                  placeholder="Add a few details..."
                ></textarea>
              </div>
              <button type="submit" class="btn btn-primary">
                <i class="bi bi-plus-lg me-1"></i>Add Task
              </button>
            </form>
          </div>
        </div>

        <!-- Stats summary -->
        <div class="d-flex justify-content-between align-items-center mb-3 px-1">
          <h5 class="mb-0">Your Tasks</h5>
          <span class="text-muted small" id="task-stats">0 tasks</span>
        </div>

        <!-- Task list -->
        <div id="task-list-container">
          <div id="task-list" class="d-flex flex-column gap-2"></div>

          <!-- Empty state -->
          <div id="empty-state" class="text-center py-5 d-none">
            <i class="bi bi-clipboard-check display-1 text-muted"></i>
            <p class="text-muted mt-2 mb-0">No tasks yet. Add one above!</p>
          </div>

          <!-- Loading state -->
          <div id="loading-state" class="text-center py-5">
            <div class="spinner-border text-primary" role="status">
              <span class="visually-hidden">Loading...</span>
            </div>
          </div>
        </div>

      </div>
    </div>
  </main>

  <!-- Toast notifications -->
  <div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div
      id="notification-toast"
      class="toast align-items-center text-bg-primary border-0"
      role="alert"
      aria-live="assertive"
      aria-atomic="true"
    >
      <div class="d-flex">
        <div class="toast-body" id="toast-message">Hello!</div>
        <button
          type="button"
          class="btn-close btn-close-white me-2 m-auto"
          data-bs-dismiss="toast"
          aria-label="Close"
        ></button>
      </div>
    </div>
  </div>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"
  ></script>
  <script src="app.js"></script>
</body>
</html>
